<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeerostock Inventory Search</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <meta name="description" content="Zeerostock inventory search portal to find surplus stock efficiently.">
</head>
<body>
    <div class="background-decor"></div>
    <main class="app-container glass-panel">
        <header>
            <h1>Zeerostock Inventory</h1>
            <p>Find surplus stock across our suppliers efficiently.</p>
        </header>

        <section class="search-form">
            <div class="input-group">
                <label for="search-input">Product Name</label>
                <input type="text" id="search-input" placeholder="e.g. MacBook Pro">
            </div>
            
            <div class="input-group">
                <label for="category-select">Category</label>
                <select id="category-select">
                    <option value="All">All Categories</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Furniture">Furniture</option>
                    <option value="Accessories">Accessories</option>
                </select>
            </div>

            <div class="price-range">
                <div class="input-group">
                    <label for="min-price">Min Price (₹)</label>
                    <input type="number" id="min-price" placeholder="0" min="0">
                </div>
                <span class="separator">-</span>
                <div class="input-group">
                    <label for="max-price">Max Price (₹)</label>
                    <input type="number" id="max-price" placeholder="Any" min="0">
                </div>
            </div>

            <button id="search-btn" class="primary-btn">Search Inventory</button>
        </section>

        <section class="results-section">
            <h2>Results <span id="results-count" class="badge"></span></h2>
            <div id="results-loader" class="loader hidden"></div>
            <div id="results-container" class="results-grid">
                <!-- Results will be injected here -->
            </div>
            <div id="no-results" class="no-results hidden">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <p>No results found for your search criteria.</p>
                <button class="ghost-btn" id="clear-filters">Clear Filters</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
